<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HWD DIAMOND STORE</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* PARTICLE */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

.loader{
  width:50px;
  height:50px;
  border:5px solid #333;
  border-top:5px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  background:linear-gradient(90deg,#06b6d4,#22c55e);
  color:black;
  font-weight:bold;
  box-shadow:0 0 20px #22c55e;
}

/* BANNER */
.banner{
  text-align:center;
  padding:25px;
}
.banner h1{
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px #22c55e; }
  to{ text-shadow:0 0 25px #06b6d4; }
}

/* CONTAINER */
.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

/* CARD */
.card{
  background:#0f172a;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,255,200,0.2);
}
.card:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 0 25px #22c55e;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.info{
  padding:10px;
}

.price{
  color:#22c55e;
}

/* BUTTON */
.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#06b6d4,#22c55e);
  cursor:pointer;
  font-weight:bold;
}
.btn:hover{
  box-shadow:0 0 20px #22c55e;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}
.modal-content{
  background:#111;
  margin:60px auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:10px;
  box-shadow:0 0 20px #22c55e;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#020617;
  color:white;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Loading HWD Store...</p>
</div>

<!-- PARTICLE -->
<canvas id="particle"></canvas>

<div class="header">🎮 HWD DIAMOND STORE</div>

<div class="banner">
<h1>Top Up Diamond Murah ⚡</h1>
<p>Cepat • Aman • Keren</p>
</div>

<div class="container">
<div class="products">

<div class="card">
<img src="https://picsum.photos/300/150?1">
<div class="info">
<h4>Mobile Legends</h4>
<p class="price">Mulai 20K</p>
<button class="btn" onclick="beli('Mobile Legends')">Beli</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/150?2">
<div class="info">
<h4>Free Fire</h4>
<p class="price">Mulai 15K</p>
<button class="btn" onclick="beli('Free Fire')">Beli</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/150?3">
<div class="info">
<h4>PUBG Mobile</h4>
<p class="price">Mulai 25K</p>
<button class="btn" onclick="beli('PUBG Mobile')">Beli</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/150?4">
<div class="info">
<h4>Valorant</h4>
<p class="price">Mulai 50K</p>
<button class="btn" onclick="beli('Valorant')">Beli</button>
</div>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="game"></h3>

<input id="id" placeholder="ID Game">
<input id="server" placeholder="Server">

<select id="diamond">
<option>86 DM - 20K</option>
<option>172 DM - 38K</option>
<option>257 DM - 56K</option>
<option>344 DM - 75K</option>
<option>429 DM - 92K</option>
</select>

<select id="bayar">
<option>QRIS</option>
<option>DANA</option>
</select>

<button class="btn" onclick="order()">ORDER</button>
<button class="btn" onclick="tutup()">BATAL</button>
</div>
</div>

<script>
// LOADING
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
},2000);

// PARTICLE
let canvas=document.getElementById("particle");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#22c55e";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(draw);
}
draw();

// STORE
let game="";
function beli(g){
  game=g;
  document.getElementById("game").innerText=g;
  document.getElementById("modal").style.display="block";
}
function tutup(){
  document.getElementById("modal").style.display="none";
}
function order(){
  let id=document.getElementById("id").value;
  let server=document.getElementById("server").value;
  let dm=document.getElementById("diamond").value;
  let bayar=document.getElementById("bayar").value;

  if(!id || !server){
    alert("Isi data dulu!");
    return;
  }

  let nomor="6289686916545"; // GANTI NOMOR

  let pesan=`Order HWD
Game: ${game}
ID: ${id} (${server})
Produk: ${dm}
Pembayaran: ${bayar}`;

  window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan));
}
</script>

</body>
</html>
